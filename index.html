<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNA Student Placement Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

  :root {
    --cream: #FFF9EF;
    --black: #000000;
    --yellow: #FFD817;
    --pink: #FF86BB;
    --orange: #FF6632;
    --blue: #0074FF;
    --green: #7ED597;
    --a: #7ED597;
    --b: #0074FF;
    --c: #FF6632;
    --d: #FF86BB;
    --card-bg: #ffffff;
    --border: rgba(0,0,0,0.08);
    --muted: #777;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--cream);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(circle at 90% 5%, rgba(255,216,23,0.25) 0%, transparent 35%),
      radial-gradient(circle at 5% 95%, rgba(126,213,151,0.2) 0%, transparent 30%);
  }

  .container {
    width: 100%;
    max-width: 540px;
  }

  /* Header */
  .header {
    margin-bottom: 28px;
    text-align: center;
  }

  .brand-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--yellow);
    border-radius: 100px;
    padding: 6px 16px;
    margin-bottom: 16px;
  }

  .brand-pill span {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--black);
  }

  h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--black);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  h1 .accent {
    color: var(--orange);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
    line-height: 1.5;
    max-width: 400px;
    margin: 0 auto;
  }

  /* Card */
  .card {
    background: #fff;
    border: 2px solid var(--black);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 14px;
    box-shadow: 4px 4px 0px var(--black);
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* Input group */
  .input-group { margin-bottom: 20px; }
  .input-group:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 6px;
  }

  label span {
    color: var(--muted);
    font-weight: 400;
    font-size: 11px;
    margin-left: 6px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  input[type="number"] {
    width: 100%;
    background: var(--cream);
    border: 2px solid var(--black);
    border-radius: 12px;
    padding: 12px 48px 12px 16px;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--black);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--yellow);
    box-shadow: 3px 3px 0px var(--black);
  }

  input[type="number"]::placeholder {
    color: #bbb;
    font-weight: 400;
  }

  .pct-label {
    position: absolute;
    right: 14px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    pointer-events: none;
  }

  /* Grade pills */
  .grade-hint {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 100px;
    border: 1.5px solid var(--black);
  }

  .pill.a { background: var(--green); }
  .pill.b { background: var(--blue); color: #fff; }
  .pill.c { background: var(--orange); color: #fff; }
  .pill.d { background: var(--pink); }

  /* Divider */
  .divider {
    border: none;
    border-top: 2px dashed rgba(0,0,0,0.1);
    margin: 20px 0;
  }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }

  .toggle-label {
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }

  .toggle {
    width: 40px;
    height: 22px;
    background: #e0e0e0;
    border: 2px solid var(--black);
    border-radius: 100px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle.active { background: var(--yellow); }

  .toggle-knob {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: var(--black);
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle.active .toggle-knob { transform: translateX(18px); }

  /* Button */
  .btn {
    width: 100%;
    padding: 15px;
    background: var(--yellow);
    color: var(--black);
    border: 2px solid var(--black);
    border-radius: 12px;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 3px 3px 0px var(--black);
    margin-top: 20px;
  }

  .btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0px var(--black); }
  .btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--black); }

  /* Result */
  .result {
    background: #fff;
    border: 2px solid var(--black);
    border-radius: 20px;
    overflow: hidden;
    display: none;
    box-shadow: 4px 4px 0px var(--black);
    animation: slideUp 0.3s ease;
  }

  .result.show { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 24px 28px 20px;
    border-bottom: 2px solid var(--black);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-header.a { background: var(--green); }
  .result-header.b { background: var(--blue); }
  .result-header.c { background: var(--orange); }
  .result-header.d { background: var(--pink); }

  .result-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.5);
    margin-bottom: 4px;
  }

  .result-header.b .result-label { color: rgba(255,255,255,0.6); }
  .result-header.c .result-label { color: rgba(255,255,255,0.7); }

  .result-grade {
    font-size: 56px;
    font-weight: 800;
    color: var(--black);
    line-height: 1;
  }

  .result-header.b .result-grade,
  .result-header.c .result-grade { color: #fff; }

  .result-badge {
    padding: 8px 18px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(0,0,0,0.12);
    color: var(--black);
    border: 2px solid var(--black);
  }

  .result-header.b .result-badge,
  .result-header.c .result-badge {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border-color: rgba(255,255,255,0.5);
  }

  .result-body { padding: 20px 28px 24px; }

  .result-desc {
    font-size: 14px;
    color: var(--black);
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .result-reasoning {
    background: var(--cream);
    border: 2px solid rgba(0,0,0,0.08);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .reasoning-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .reasoning-steps { list-style: none; }

  .reasoning-steps li {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    line-height: 1.5;
    padding: 3px 0;
    padding-left: 16px;
    position: relative;
  }

  .reasoning-steps li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--orange);
    font-size: 11px;
    font-weight: 700;
  }

  .reasoning-steps li.highlight {
    color: var(--black);
    font-weight: 700;
  }

  /* Grade reference */
  .reference {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 18px;
  }

  .ref-item {
    border: 2px solid var(--black);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }

  .ref-item.a { background: var(--green); }
  .ref-item.b { background: var(--blue); }
  .ref-item.c { background: var(--orange); }
  .ref-item.d { background: var(--pink); }

  .ref-grade {
    font-size: 20px;
    font-weight: 800;
    color: var(--black);
    margin-bottom: 2px;
  }

  .ref-item.b .ref-grade,
  .ref-item.c .ref-grade { color: #fff; }

  .ref-range {
    font-size: 9px;
    font-weight: 600;
    color: rgba(0,0,0,0.5);
  }

  .ref-item.b .ref-range,
  .ref-item.c .ref-range { color: rgba(255,255,255,0.7); }

  .error-msg {
    color: var(--orange);
    font-size: 12px;
    font-weight: 500;
    margin-top: 6px;
    display: none;
  }

  /* Reset */
  .reset-btn {
    background: none;
    border: none;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    margin-top: 12px;
    display: none;
    text-align: center;
    width: 100%;
    padding: 6px;
  }

  .reset-btn.show { display: block; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="brand-pill">
      <span>The Nuggets Academy</span>
    </div>
    <h1>Student <span class="accent">Placement</span> Tool</h1>
    <p class="subtitle">Enter exam results to determine the correct class level for a new or returning student.</p>
  </div>

  <div class="card" id="inputCard">
    <div class="card-title">Enter Exam Results</div>

    <div class="input-group">
      <label>Previous Year End-of-Year (EOY) Result <span>primary anchor</span></label>
      <div class="input-wrapper">
        <input type="number" id="eoyInput" min="0" max="100" placeholder="e.g. 82" />
        <span class="pct-label">%</span>
      </div>
    </div>

    <hr class="divider">

    <div class="input-group" id="waGroup">
      <label>Recent Weighted Assessment (WA) Result <span>current snapshot</span></label>
      <div class="input-wrapper">
        <input type="number" id="waInput" min="0" max="100" placeholder="e.g. 45" />
        <span class="pct-label">%</span>
      </div>
    </div>

    <div class="toggle-row" onclick="toggleNoWA()" style="margin-top:14px;">
      <span class="toggle-label">No WA result available</span>
      <div class="toggle" id="noWaToggle"><div class="toggle-knob"></div></div>
    </div>

    <p class="error-msg" id="errorMsg">Please enter a valid EOY result (0–100).</p>

    <button class="btn" onclick="classify()">Determine Placement →</button>

    <div class="reference">
      <div class="ref-item a"><div class="ref-grade">A</div><div class="ref-range">70–100%</div></div>
      <div class="ref-item b"><div class="ref-grade">B</div><div class="ref-range">55–69%</div></div>
      <div class="ref-item c"><div class="ref-grade">C</div><div class="ref-range">45–54%</div></div>
      <div class="ref-item d"><div class="ref-grade">D</div><div class="ref-range">≤44%</div></div>
    </div>
  </div>

  <div class="result" id="resultCard">
    <div class="result-header" id="resultHeader">
      <div>
        <div class="result-label">Recommended Placement</div>
        <div class="result-grade" id="resultGrade"></div>
      </div>
      <div class="result-badge" id="resultBadge"></div>
    </div>
    <div class="result-body">
      <p class="result-desc" id="resultDesc"></p>
      <div class="result-reasoning">
        <div class="reasoning-title">How we got here</div>
        <ul class="reasoning-steps" id="reasoningSteps"></ul>
      </div>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn" onclick="reset()">← Classify another student</button>

</div>

<script>
  let noWA = false;

  function toggleNoWA() {
    noWA = !noWA;
    const toggle = document.getElementById('noWaToggle');
    const waGroup = document.getElementById('waGroup');
    const waInput = document.getElementById('waInput');
    toggle.classList.toggle('active', noWA);
    waGroup.style.opacity = noWA ? '0.3' : '1';
    waGroup.style.pointerEvents = noWA ? 'none' : 'auto';
    if (noWA) waInput.value = '';
  }

  function getGrade(pct) {
    if (pct >= 70) return 'A';
    if (pct >= 55) return 'B';
    if (pct >= 45) return 'C';
    return 'D';
  }

  function dropGrade(grade) {
    const order = ['A','B','C','D'];
    return order[Math.min(order.indexOf(grade) + 1, 3)];
  }

  function bumpGrade(grade) {
    const order = ['A','B','C','D'];
    return order[Math.max(order.indexOf(grade) - 1, 0)];
  }

  function gradeDesc(grade) {
    return {
      A: 'Strong foundation. Place in the Advanced group.',
      B: 'Slightly above average. Place in the Intermediate group.',
      C: 'Borderline. Place in the Foundation group.',
      D: 'Significant gaps. Place in the Core Support group.'
    }[grade];
  }

  function badgeLabel(grade) {
    return { A: 'Advanced', B: 'Intermediate', C: 'Foundation', D: 'Core Support' }[grade];
  }

  function classify() {
    const eoyVal = document.getElementById('eoyInput').value;
    const waVal = document.getElementById('waInput').value;
    const errorMsg = document.getElementById('errorMsg');

    if (eoyVal === '' || isNaN(eoyVal) || eoyVal < 0 || eoyVal > 100) {
      errorMsg.style.display = 'block';
      return;
    }
    errorMsg.style.display = 'none';

    const eoy = parseFloat(eoyVal);
    const wa = (!noWA && waVal !== '') ? parseFloat(waVal) : null;
    const eoyGrade = getGrade(eoy);
    let finalGrade = eoyGrade;
    const steps = [];

    steps.push(`EOY score: ${eoy}% → baseline grade <strong>${eoyGrade}</strong>`);

    if (wa !== null) {
      const waGrade = getGrade(wa);
      steps.push(`WA score: ${wa}% → current snapshot grade <strong>${waGrade}</strong>`);

      if (wa < 50 && waGrade !== eoyGrade) {
        finalGrade = dropGrade(eoyGrade);
        steps.push(`WA is failing (below 50%) → drop 1 grade from EOY baseline`);
        steps.push(`Adjusted placement: <strong>${finalGrade}</strong>`);
      } else if ((eoyGrade === 'C' || eoyGrade === 'D') && wa >= 80) {
        finalGrade = bumpGrade(eoyGrade);
        steps.push(`WA is significantly strong (80%+) with weak EOY → bump up 1 grade`);
        steps.push(`Adjusted placement: <strong>${finalGrade}</strong>`);
      } else {
        steps.push(`WA does not trigger an adjustment → EOY baseline holds`);
        steps.push(`Final placement: <strong>${finalGrade}</strong>`);
      }
    } else {
      steps.push(`No WA available → EOY result used as sole indicator`);
      steps.push(`Final placement: <strong>${finalGrade}</strong>`);
    }

    const g = finalGrade.toLowerCase();
    document.getElementById('resultGrade').textContent = finalGrade;
    document.getElementById('resultHeader').className = `result-header ${g}`;
    document.getElementById('resultBadge').textContent = badgeLabel(finalGrade);
    document.getElementById('resultDesc').textContent = gradeDesc(finalGrade);

    const ol = document.getElementById('reasoningSteps');
    ol.innerHTML = steps.map((s, i) =>
      `<li class="${i === steps.length - 1 ? 'highlight' : ''}">${s}</li>`
    ).join('');

    document.getElementById('inputCard').style.display = 'none';
    document.getElementById('resultCard').classList.add('show');
    document.getElementById('resetBtn').classList.add('show');
  }

  function reset() {
    document.getElementById('eoyInput').value = '';
    document.getElementById('waInput').value = '';
    document.getElementById('inputCard').style.display = 'block';
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('resetBtn').classList.remove('show');
    if (noWA) toggleNoWA();
  }
</script>
</body>
</html>
